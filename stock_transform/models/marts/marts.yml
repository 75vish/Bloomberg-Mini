version: 2

models:
  - name: mart_vwap
    description: "Volume weighted average price per symbol per 5-min window"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: vwap
        tests:
          - not_null

  - name: mart_anomalies
    description: "Ticks flagged as anomalous vs VWAP"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: anomaly_type
        tests:
          - accepted_values:
              values: ['PRICE_SPIKE', 'PRICE_DROP', 'NORMAL']

  - name: mart_moving_avg
    description: "5 and 20 period moving averages with trend signal"
    columns:
      - name: signal
        tests:
          - accepted_values:
              values: ['BULLISH', 'BEARISH']